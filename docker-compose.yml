# Local Postgres + pgvector for the Nonprofit Profile Builder.
# Standard Postgres image with the pgvector extension preinstalled, so this
# maps cleanly onto Supabase (or any managed Postgres) later — no exotic deps.
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: npo_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-npo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-npo}
      POSTGRES_DB: ${POSTGRES_DB:-npo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - npo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-npo} -d ${POSTGRES_DB:-npo}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  npo_pgdata:
